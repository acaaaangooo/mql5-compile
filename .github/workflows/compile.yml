- name: Compile
        shell: powershell
        run: |
          $me = "C:\Program Files\MetaTrader 5\metaeditor64.exe"
          $src = "$env:GITHUB_WORKSPACE\RSI_BuySell_Levels.mq5"
          $dst = "C:\Program Files\MetaTrader 5\MQL5\Indicators\RSI_BuySell_Levels.mq5"
          Copy-Item $src $dst
          Start-Process $me -ArgumentList "/compile:$dst /log" -Wait
          Copy-Item "C:\Program Files\MetaTrader 5\MQL5\Indicators\RSI_BuySell_Levels.ex5" "$env:GITHUB_WORKSPACE\"

      - name: Upload ex5
        uses: actions/upload-artifact@v4
        with:
          name: indicator
          path: RSI_BuySell_Levels.ex5
