name: Compile MQL5

on: [push]

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/upload-artifact@v4

      - name: Download MT5
        run: curl -L -o mt5setup.exe https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe

      - name: Install MT5
        run: Start-Process mt5setup.exe -ArgumentList '/auto' -Wait
        shell: powershell

      - name: Compile
        run: |
          $me = "C:\Program Files\MetaTrader 5\metaeditor64.exe"
          $file = "$env:GITHUB_WORKSPACE\RSI_BuySell_Levels.mq5"
          Start-Process $me -ArgumentList "/compile:$file /log" -Wait
        shell: powershell

      - name: Upload ex5
        uses: actions/upload-artifact@v3
        with:
          name: indicator
          path: "*.ex5"
