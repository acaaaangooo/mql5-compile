name: Compile MQL5

on: [push]

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MT5
        run: curl -L -o mt5setup.exe https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe

      - name: Install MT5
        shell: powershell
        run: Start-Process mt5setup.exe -ArgumentList '/auto' -Wait

      - name: Compile
        shell: powershell
        run: |
          $me = "C:\Program Files\MetaTrader 5\metaeditor64.exe"
          $dir = "C:\Program Files\MetaTrader 5\MQL5\Indicators"
          $inc = "C:\Program Files\MetaTrader 5\MQL5"
          $dst = "$dir\RSI_BuySell_Levels.mq5"
          New-Item -ItemType Directory -Force -Path $dir
          Copy-Item "$env:GITHUB_WORKSPACE\RSI_BuySell_Levels.mq5" $dst
          & $me /compile:"$dst" /include:"$inc" /log:"$env:GITHUB_WORKSPACE\compile.log"
          Start-Sleep -Seconds 15
          Get-Content "$env:GITHUB_WORKSPACE\compile.log" -ErrorAction SilentlyContinue
          Get-ChildItem "$dir"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: indicator
          path: |
            C:\Program Files\MetaTrader 5\MQL5\Indicators\RSI_BuySell_Levels.ex5
            compile.log
