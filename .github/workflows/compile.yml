name: Compile MQL5
on: [push]
jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and Install MT5
        shell: cmd
        run: |
          curl -L -o mt5setup.exe https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe
          start /wait mt5setup.exe /auto
          timeout /t 10

      - name: Initialize MT5
        shell: powershell
        run: |
          Start-Process "C:\Program Files\MetaTrader 5\terminal64.exe" -ArgumentList '/portable'
          Start-Sleep -Seconds 25
          Stop-Process -Name "terminal64" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

      - name: Compile
        shell: powershell
        run: |
          $mt5dir = "C:\Program Files\MetaTrader 5"
          $inddir = "$mt5dir\MQL5\Indicators"
          $dst = "$inddir\RSI_BuySell_Levels.mq5"
          $log = "$mt5dir\MQL5\Indicators\RSI_BuySell_Levels.log"
          Copy-Item "$env:GITHUB_WORKSPACE\RSI_BuySell_Levels.mq5" $dst -Force
          $p = Start-Process "$mt5dir\metaeditor64.exe" `
            -ArgumentList "/portable /compile:$dst /include:$mt5dir\MQL5 /log:$log" `
            -WorkingDirectory $mt5dir `
            -Wait -PassThru
          Start-Sleep -Seconds 20
          Write-Host "Exit code: $($p.ExitCode)"
          Get-Content $log -ErrorAction SilentlyContinue
          Get-ChildItem $inddir
          Copy-Item "$inddir\RSI_BuySell_Levels.ex5" "$env:GITHUB_WORKSPACE\" -ErrorAction SilentlyContinue
          Copy-Item $log "$env:GITHUB_WORKSPACE\compile.log" -ErrorAction SilentlyContinue

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: indicator
          path: |
            RSI_BuySell_Levels.ex5
            compile.log
