name: Compile MQL5
on: [push]
jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MT5
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile "mt5setup.exe"
          Start-Process mt5setup.exe -ArgumentList '/auto' -Wait
          Start-Sleep -Seconds 10

      - name: Setup files
        shell: powershell
        run: |
          $mt5 = "C:\Program Files\MetaTrader 5"
          New-Item -ItemType Directory -Force "$mt5\MQL5\Indicators"
          Copy-Item "$env:GITHUB_WORKSPACE\RSI_BuySell_Levels.mq5" "$mt5\MQL5\Indicators\"

      - name: Compile via MT5 terminal
        shell: powershell
        run: |
          $mt5 = "C:\Program Files\MetaTrader 5"
          # Run terminal to init data folder
          $t = Start-Process "$mt5\terminal64.exe" -PassThru
          Start-Sleep -Seconds 30
          $t | Stop-Process -Force
          Start-Sleep -Seconds 5
          # Now compile
          $me = "$mt5\metaeditor64.exe"
          $src = "$mt5\MQL5\Indicators\RSI_BuySell_Levels.mq5"
          $log = "$mt5\MQL5\Indicators\RSI_BuySell_Levels.log"
          Start-Process $me -ArgumentList "/compile:`"$src`" /inc:`"$mt5\MQL5`" /log:`"$log`"" -Wait
          Start-Sleep -Seconds 15
          if (Test-Path $log) { Get-Content $log }
          Get-ChildItem "$mt5\MQL5\Indicators"
          if (Test-Path "$mt5\MQL5\Indicators\RSI_BuySell_Levels.ex5") {
            Copy-Item "$mt5\MQL5\Indicators\RSI_BuySell_Levels.ex5" "$env:GITHUB_WORKSPACE\"
            Copy-Item $log "$env:GITHUB_WORKSPACE\compile.log" -ErrorAction SilentlyContinue
            Write-Host "SUCCESS! ex5 file found!"
          } else {
            Write-Host "FAILED - no ex5 generated"
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: indicator
          path: |
            RSI_BuySell_Levels.ex5
            compile.log
